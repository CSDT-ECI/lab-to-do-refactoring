name: CI/CD Pipeline — LabToDo

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:

  build:
    name: 🔨 Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile project (skip tests)
        run: ./mvnw clean compile -B

      - name: Cache compiled classes for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: compiled-classes
          path: target/
          retention-days: 1

  test:
    name: 🧪 Test & Coverage
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests + enforce 85% coverage
        run: ./mvnw verify -B

      - name: Upload JaCoCo HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

      - name: SonarCloud analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw sonar:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.exclusions="src/test/**" \
            -B

  deploy:
    name: 🚀 Deploy (simulated)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Package application
        run: ./mvnw package -DskipTests -B

      - name: Simulate deployment
        run: |
          echo "========================================"
          echo "  🚀  SIMULATED DEPLOYMENT"
          echo "========================================"
          echo "  Artifact : target/labtodo.jar"
          echo "  Target   : production-server (simulated)"
          echo "  Timestamp: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "  Git SHA  : ${{ github.sha }}"
          echo "  Branch   : ${{ github.ref_name }}"
          echo "========================================"
          echo "  ✅  Deployment completed successfully"
          echo "========================================"

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: labtodo-jar
          path: target/labtodo.jar
          retention-days: 7