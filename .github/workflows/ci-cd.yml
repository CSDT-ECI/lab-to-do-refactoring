name: CI/CD Pipeline — LabToDo

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:

  build:
    name: 🔨 Build (compile + dependency check)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Compile project (skip tests)
        run: ./mvnw -B clean compile

      - name: OWASP Dependency-Check (Maven plugin)
        run: |
          ./mvnw -B org.owasp:dependency-check-maven:check \
            -Dformat=XML -DoutputDirectory=target/dependency-check-report \
            -DfailBuildOnCVSS=0 || true

      - name: Cache compiled classes for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: compiled-classes
          path: target/
          retention-days: 1

  test:
    name: 🧪 Test & Coverage
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests + enforce 85% coverage
        run: |
          # Run tests and generate coverage reports (JaCoCo)
          ./mvnw -B verify

      - name: Upload JaCoCo HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

      - name: SonarCloud analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw sonar:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.exclusions="src/test/**" \
            -B

      - name: Upload Dependency-Check XML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report
          retention-days: 7

  deploy:
    name: 🚀 Deploy (simulated)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Package application
        run: ./mvnw package -DskipTests -B

      - name: Simulate deployment
        run: |
          echo "========================================"
          echo "  🚀  SIMULATED DEPLOYMENT"
          echo "========================================"
          echo "  Artifact : target/labtodo.jar"
          echo "  Target   : production-server (simulated)"
          echo "  Timestamp: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "  Git SHA  : ${{ github.sha }}"
          echo "  Branch   : ${{ github.ref_name }}"
          echo "========================================"
          echo "  ✅  Deployment completed successfully"
          echo "========================================"

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: labtodo-jar
          path: target/labtodo.jar
          retention-days: 7

  codeql:
    name: 🔎 CodeQL analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: java

      - name: Build for CodeQL
        run: |
          ./mvnw -B -DskipTests clean package

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v2

  notify:
    name: 📣 Notify (Slack + GitHub issue)
    runs-on: ubuntu-latest
    needs: [test, codeql]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Notify Slack (optional)
        if: ${{ secrets.SLACK_WEBHOOK != '' }}
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

      - name: Create CI summary issue (if failures)
        if: ${{ always() }}
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const status = process.env['GITHUB_RUN_ID'] ? (await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId
            })).data.conclusion : 'unknown';
            if (status !== 'success') {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `CI failure: run ${context.runId} (${context.sha.slice(0,7)})`,
                body: `Automated CI run [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) concluded with status: **${status}**.\n\nPlease check test reports, SonarCloud and CodeQL findings.\n\nArtifacts: jacoco-report, dependency-check-report, labtodo-jar.`
              });
            }
