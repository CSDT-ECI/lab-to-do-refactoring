# Conexion a mariadb usando variables de entorno
spring.datasource.url=jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:labtodo}?createDatabaseIfNotExist=${DB_CREATE_IF_NOT_EXISTS:true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:my-secret-pw}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql=true

# Puerto del servidor usando variable de entorno
server.port=${SERVER_PORT:8080}
